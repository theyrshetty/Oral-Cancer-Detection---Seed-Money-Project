name: oralgard
description: OralGuard — Oral Cancer Screening Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # Image picker (for Image Matcher)
  image_picker: ^1.0.7

  # HTTP for AI API calls
  http: ^1.2.0

  # Fonts
  google_fonts: ^6.2.1

  # URL launcher
  url_launcher: ^6.2.5

  # Permission handler (camera)
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
